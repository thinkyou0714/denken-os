name: deploy-pages

# オフライン学習アプリ(web/)を main マージ時に GitHub Pages へ自動公開する。
# 事前準備(1回): Settings → Pages → Build and deployment → Source = "GitHub Actions"。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# 同時デプロイは1本に直列化（実行中はキャンセルしない）。

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # SEC-1: 公開前に品質ゲートを通す。verify が lint/typecheck/validate:data/test を回し、
      # 最後に build:web で web/dist/app.js を生成する。ゲートが落ちれば deploy ジョブは走らない
      # （『CI が赤でも Pages に公開される』穴を塞ぐ。データ検証失敗時に誤問題を出さない）。
      - name: Quality gate + build (npm run verify)
        run: npm run verify

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

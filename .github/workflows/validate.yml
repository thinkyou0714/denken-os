name: validate

# 09-ci-quality-gate: schema違反・出典欠落・検証未通過の公開を機械的に止める安全網。
on:
  push:
  pull_request:
  workflow_dispatch:

# push と pull_request の二重起動を抑制。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最小権限（コード読み取りのみ）。CI は外部書き込みを行わない。
permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 供給網: 利用者に届く本番依存の high/critical で公開を止める（lockfile pin と対）。
      # dev ツール（vitest/esbuild 等）はバンドルに含まれず CI でしか動かないため gate には含めない。
      - name: Audit production dependencies (high+, gate)
        run: npm audit --audit-level=high --omit=dev

      # dev 依存の脆弱性は可視化のみ（破壊的更新が必要な場合があり gate にはしない）。
      - name: Audit all dependencies (visibility only)
        run: npm audit --audit-level=moderate || true

      - name: Lint & format check (Biome)
        run: npm run lint

      - name: Typecheck (lib/scripts/tests)
        run: npm run typecheck

      - name: Typecheck (web app)
        run: npm run typecheck:web

      - name: Validate problem data against schema
        run: npm run validate:data

      - name: Run unit tests (with coverage gate)
        run: npm run test:coverage

      - name: Build offline web app
        run: npm run build:web

name: validate

# 09-ci-quality-gate: schema違反・出典欠落・検証未通過の公開を機械的に止める安全網。
on:
  push:
    branches: [main]  # main push のみ。PR 実行との二重起動を防ぐ（I-091）。
  pull_request:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: "キャッシュをクリアして再ビルドする（デバッグ用）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# 同一ブランチ・PRへの新 push 時に旧実行をキャンセルし最新だけ走らせる（I-085）。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最小権限（コード読み取りのみ）。CI は外部書き込みを行わない。
permissions:
  contents: read

jobs:
  # ジョブ1: Lint・型チェック・データバリデーション
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # setup-node の cache: npm は ~/.npm（npm のダウンロードキャッシュ）を
      # package-lock.json のハッシュで自動キーイングし、3ジョブ全てで共有する（#93）。
      # npm ci は実行時に node_modules を作り直すため、別途 actions/cache で node_modules を
      # 丸ごとキャッシュするのは ci の前提と衝突して壊れやすい。setup-node の npm キャッシュで十分。
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: ${{ inputs.clear_cache == 'true' && '' || 'npm' }}

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint & format check (Biome)
        run: npm run lint

      - name: Typecheck (lib/scripts/tests)
        run: npm run typecheck

      - name: Typecheck (web app)
        run: npm run typecheck:web

      - name: Validate problem data against schema
        run: npm run validate:data

      # 生成物(コミット済み)が最新かを検証する（#78/#79）。両スクリプトは
      # 固定シード／決定論ソルバで冪等（Math.random 不使用、タイムスタンプ無し）。
      # 生成し直して差分が出たら「再生成し忘れ」としてCIを落とす。
      - name: Verify committed web/problems.json is fresh
        run: |
          npm run build:problems
          git diff --exit-code -- web/problems.json

      - name: Verify committed data/problems is fresh
        run: |
          npm run seed:data
          git diff --exit-code -- data/problems/

  # ジョブ2: ユニットテスト（カバレッジ計測）
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: ${{ inputs.clear_cache == 'true' && '' || 'npm' }}

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (with coverage gate)
        run: npm run test:coverage 2>&1 | tee /tmp/test-output.txt; exit ${PIPESTATUS[0]}

      - name: Upload coverage to step summary
        if: always()
        run: tail -20 /tmp/test-output.txt >> "$GITHUB_STEP_SUMMARY"

      # 品質ステータス監査をPRで可視化する（#94）。advisory（非ブロッキング）。
      # 既定の audit:status は exit 0 だが、万一の失敗でもCIを落とさないよう
      # continue-on-error を併用し、結果はステップサマリへ出す。
      - name: Repo status audit (advisory)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          {
            echo "### Repo status audit (advisory)"
            echo '```'
            npm run --silent audit:status || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ジョブ3: ウェブアプリビルド（validate + test が成功した場合のみ実行）
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: ${{ inputs.clear_cache == 'true' && '' || 'npm' }}

      - name: Install dependencies
        run: npm ci

      - name: Build offline web app
        run: npm run build:web

      - name: Upload web dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

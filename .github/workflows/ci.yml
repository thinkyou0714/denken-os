name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[figures,schedule,units,dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
      - name: Smoke (template check)
        run: denken check --seeds 10

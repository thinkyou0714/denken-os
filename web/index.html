<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DENKEN-OS — 電験二種 学習</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="theme-color" content="#0e1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#2b59d4" media="(prefers-color-scheme: light)" />
    <style>
      /* ===== デザイントークン（明/暗の2系統。色は意味で名付ける） ===== */
      :root {
        color-scheme: light dark;
        --bg: #f6f8fc;
        --surface: #ffffff;
        --surface-2: #eef1f7;
        --text: #1a2336;
        --muted: #5c6679;
        --border: #e4e8f1;
        --border-strong: #cfd6e4;
        --accent: #2b59d4;
        --accent-strong: #1e44b0;
        --accent-contrast: #ffffff;
        --accent-soft: #2b59d416;
        --ok: #12a16b;
        --ok-soft: #12a16b18;
        --ng: #e0364f;
        --ng-soft: #e0364f18;
        --warn-bg: #fff6e2;
        --warn-text: #7a5600;
        --warn-border: #f1d79a;
        --shadow-sm: 0 1px 2px rgba(20, 30, 60, .06), 0 1px 3px rgba(20, 30, 60, .05);
        --shadow-md: 0 4px 14px rgba(20, 30, 60, .09);
        --r-sm: 8px;
        --r-md: 12px;
        --r-lg: 16px;
        --r-pill: 999px;
        --ring: 0 0 0 3px var(--accent-soft), 0 0 0 1px var(--accent);
        --ease: cubic-bezier(.2, .7, .3, 1);
        --gap: 1rem;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1017;
          --surface: #161b25;
          --surface-2: #1d2330;
          --text: #e7eaf1;
          --muted: #9aa4b6;
          --border: #262d3b;
          --border-strong: #38445a;
          --accent: #5d83f7;
          --accent-strong: #7596f9;
          --accent-contrast: #0d1017;
          --accent-soft: #5d83f722;
          --ok: #34d399;
          --ok-soft: #34d39920;
          --ng: #f87171;
          --ng-soft: #f8717120;
          --warn-bg: #2a2410;
          --warn-text: #f0cf7a;
          --warn-border: #4a3e16;
          --shadow-sm: 0 1px 2px rgba(0, 0, 0, .4);
          --shadow-md: 0 6px 20px rgba(0, 0, 0, .45);
        }
      }

      /* ===== ベース ===== */
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
        margin: 0; padding: 0 1rem 4rem; max-width: 760px; margin-inline: auto;
        line-height: 1.65; color: var(--text); background: var(--bg);
        -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
        font-feature-settings: "palt";
      }
      h1, h2, h3 { line-height: 1.3; letter-spacing: .01em; }
      h2 { font-size: 1rem; margin: 1.5rem 0 .5rem; font-weight: 700; }
      a { color: var(--accent); }
      :focus-visible { outline: none; box-shadow: var(--ring); border-radius: var(--r-sm); }

      /* ===== ヘッダ ===== */
      header {
        display: flex; justify-content: space-between; align-items: center;
        gap: .6rem 1rem; flex-wrap: wrap; padding: 1.1rem 0 .6rem;
      }
      .brand { display: flex; align-items: center; gap: .6rem; min-width: 0; }
      .brand .logo { width: 34px; height: 34px; border-radius: 9px; box-shadow: var(--shadow-sm); flex: none; }
      .brand h1 { font-size: 1.12rem; margin: 0; font-weight: 800; letter-spacing: .02em; }
      .brand .tagline { font-size: .72rem; color: var(--muted); margin-top: -1px; }
      .stats { display: flex; gap: .4rem; flex-wrap: wrap; }
      .pill {
        font-size: .76rem; font-weight: 600; color: var(--muted);
        background: var(--surface); border: 1px solid var(--border);
        padding: .28rem .6rem; border-radius: var(--r-pill); white-space: nowrap;
        box-shadow: var(--shadow-sm);
      }

      /* ===== ナビ（セグメント風タブ） ===== */
      nav {
        display: flex; gap: .25rem; flex-wrap: nowrap; overflow-x: auto;
        position: sticky; top: 0; z-index: 5;
        background: color-mix(in srgb, var(--bg) 86%, transparent);
        -webkit-backdrop-filter: saturate(1.4) blur(10px); backdrop-filter: saturate(1.4) blur(10px);
        padding: .5rem 0; margin: 0 -1rem; padding-inline: 1rem;
        border-bottom: 1px solid var(--border);
        scrollbar-width: none;
      }
      nav::-webkit-scrollbar { display: none; }
      nav button {
        padding: .42rem .85rem; font-size: .85rem; font-weight: 600; white-space: nowrap;
        border: 1px solid transparent; border-radius: var(--r-pill);
        background: transparent; color: var(--muted); cursor: pointer;
        transition: background .18s var(--ease), color .18s var(--ease), transform .12s var(--ease);
      }
      nav button:hover { background: var(--surface-2); color: var(--text); }
      nav button:active { transform: scale(.96); }
      nav button[aria-current="true"] {
        background: var(--accent); color: var(--accent-contrast);
        border-color: var(--accent); box-shadow: var(--shadow-sm);
      }

      main { margin-top: 1rem; }

      /* ===== バナー ===== */
      .demo {
        display: flex; gap: .5rem; align-items: flex-start;
        background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border);
        padding: .55rem .75rem; border-radius: var(--r-md); font-size: .78rem; margin: .7rem 0;
      }

      /* ===== 出題 ===== */
      #meta {
        display: inline-block; color: var(--muted); font-size: .78rem; font-weight: 600;
        background: var(--surface-2); padding: .2rem .6rem; border-radius: var(--r-pill); margin-top: .4rem;
      }
      .stmt {
        font-size: 1.18rem; line-height: 1.7; margin: .7rem 0 1.1rem; font-weight: 500;
        letter-spacing: .01em; animation: fade .35s var(--ease) both;
      }
      .answers { display: grid; gap: .5rem; }
      .choice {
        padding: .8rem 1rem; font: inherit; font-size: 1rem;
        border: 1px solid var(--border-strong); border-radius: var(--r-md);
        background: var(--surface); color: var(--text); cursor: pointer; text-align: left;
        box-shadow: var(--shadow-sm);
        transition: border-color .15s var(--ease), background .15s var(--ease), transform .1s var(--ease), box-shadow .15s var(--ease);
      }
      .choice:hover { border-color: var(--accent); background: var(--accent-soft); }
      .choice:active { transform: translateY(1px); }
      .choice:disabled { cursor: default; box-shadow: none; opacity: .96; }
      .choice.correct { border-color: var(--ok); background: var(--ok-soft); color: var(--text); font-weight: 600; }
      .choice.wrong { border-color: var(--ng); background: var(--ng-soft); color: var(--text); }
      input.num {
        padding: .8rem; font: inherit; font-size: 1rem; width: 100%;
        border: 1px solid var(--border-strong); border-radius: var(--r-md);
        background: var(--surface); color: var(--text);
      }

      /* ===== フィードバック・解説 ===== */
      #result { animation: fade .3s var(--ease) both; }
      .feedback { font-weight: 800; font-size: 1.05rem; margin: 1rem 0 .4rem; display: flex; align-items: center; gap: .4rem; }
      .ok { color: var(--ok); } .ng { color: var(--ng); }
      .rate { display: flex; gap: .4rem; flex-wrap: wrap; margin: .7rem 0; }
      .rate button {
        flex: 1 1 auto; padding: .6rem .5rem; font: inherit; font-size: .88rem; font-weight: 600;
        border: 1px solid var(--border-strong); border-radius: var(--r-md);
        background: var(--surface); color: var(--text); cursor: pointer; box-shadow: var(--shadow-sm);
        transition: border-color .15s var(--ease), background .15s var(--ease), transform .1s var(--ease);
      }
      .rate button:hover { border-color: var(--accent); background: var(--accent-soft); }
      .rate button:active { transform: translateY(1px); }
      .solution {
        background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent);
        border-radius: var(--r-md); padding: .7rem .85rem; margin: .6rem 0; box-shadow: var(--shadow-sm);
      }
      .solution strong { display: block; font-size: .82rem; color: var(--accent); margin-bottom: .2rem; letter-spacing: .03em; }
      .solution ol { margin: .3rem 0; padding-left: 1.3rem; }
      .solution ol li { margin: .15rem 0; }
      .src { color: var(--muted); font-size: .78rem; margin-top: .4rem; }
      .share {
        white-space: pre-wrap; background: var(--surface-2); color: var(--muted);
        padding: .7rem .85rem; border-radius: var(--r-md); font-size: .82rem; margin-top: .6rem;
        border: 1px dashed var(--border-strong);
      }

      /* ===== ボタン ===== */
      .primary {
        margin-top: 1.1rem; padding: .72rem 1.4rem; font: inherit; font-size: 1rem; font-weight: 700;
        border-radius: var(--r-md); border: none; cursor: pointer;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: var(--accent-contrast); box-shadow: var(--shadow-md);
        transition: transform .12s var(--ease), filter .15s var(--ease);
      }
      .primary:hover { filter: brightness(1.06); }
      .primary:active { transform: translateY(1px) scale(.99); }

      /* ===== ツールバー・フォーム ===== */
      .toolbar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin: .5rem 0 .8rem; }
      label { font-size: .85rem; color: var(--muted); font-weight: 600; }
      select, input[type="date"], input[type="number"] {
        padding: .5rem .6rem; font: inherit; font-size: .9rem;
        border: 1px solid var(--border-strong); border-radius: var(--r-sm);
        background: var(--surface); color: var(--text);
      }

      /* ===== 進捗系 ===== */
      .bar { background: var(--surface-2); border-radius: var(--r-pill); height: .6rem; overflow: hidden; box-shadow: inset 0 0 0 1px var(--border); }
      .bar > span { display: block; height: 100%; border-radius: var(--r-pill); background: linear-gradient(90deg, var(--accent), var(--accent-strong)); transition: width .5s var(--ease); }
      .row { display: grid; grid-template-columns: 5.5rem 1fr 4.5rem; gap: .6rem; align-items: center; margin: .45rem 0; font-size: .85rem; }
      .chip { font-size: .72rem; font-weight: 700; padding: .12rem .5rem; border-radius: var(--r-pill); border: 1px solid var(--border-strong); text-align: center; }
      .chip.m0 { color: var(--muted); }
      .chip.m1 { color: var(--ng); border-color: var(--ng); background: var(--ng-soft); }
      .chip.m2 { color: #b8860b; border-color: #d7b45e; background: #b8860b14; }
      .chip.m3 { color: var(--ok); border-color: var(--ok); background: var(--ok-soft); }
      .card {
        border: 1px solid var(--border); border-radius: var(--r-md); padding: .75rem .85rem; margin: .5rem 0;
        background: var(--surface); box-shadow: var(--shadow-sm); animation: fade .3s var(--ease) both;
      }
      .muted { color: var(--muted); font-size: .85rem; }
      .big { font-size: 1.9rem; font-weight: 800; letter-spacing: -.01em; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }

      /* ===== 公式テーブル ===== */
      table.fx { width: 100%; border-collapse: collapse; font-size: .85rem; }
      table.fx td { border-bottom: 1px solid var(--border); padding: .42rem .25rem; vertical-align: top; }
      table.fx tr:last-child td { border-bottom: none; }
      table.fx td:first-child { white-space: nowrap; color: var(--muted); font-weight: 600; padding-right: .7rem; }

      /* ===== 図 ===== */
      figure.figure {
        margin: .7rem 0; padding: .7rem; border: 1px solid var(--border); border-radius: var(--r-md);
        text-align: center; overflow-x: auto; background: var(--surface); box-shadow: var(--shadow-sm);
      }
      figure.figure svg { width: 100%; max-width: 320px; height: auto; display: inline-block; color: var(--text); }

      footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: .72rem; color: var(--muted); }
      sub, sup { font-size: .72em; }

      @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="logo" src="./icon.svg" alt="" />
        <div>
          <h1>DENKEN-OS</h1>
          <div class="tagline">電験二種 学習OS</div>
        </div>
      </div>
      <div class="stats"><span id="streak" class="pill"></span><span id="countdown" class="pill"></span></div>
    </header>

    <nav id="nav" aria-label="メニュー"></nav>

    <p class="demo"><span aria-hidden="true">⚠️</span><span>問題は自動生成（コードで検算済み・未監修のデモ）。正解の数値はコード算出ですが、本番運用前に人の目チェックを通します。</span></p>

    <main id="view" aria-live="polite"></main>

    <footer>
      オフライン対応 PWA。学習記録はこの端末内（localStorage）にのみ保存されます。<br />
      復習は FSRS（最新の間隔反復アルゴリズム）。コード=MIT / 問題データ=CC-BY-SA-4.0。
    </footer>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>

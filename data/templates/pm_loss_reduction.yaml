id: pm_loss_reduction
field_id: pm-loss-reduction
type: essay
title: 配電系統の電力損失低減策(論説)
difficulty: exam

statement_template: >-
  高圧配電系統における電力損失を低減するための代表的な方策を3つ挙げ、
  それぞれの原理を簡潔に説明せよ。

explanation_template: >-
  配電損失は線路抵抗による P_loss = 3 I² R が支配的であり、電流 I を減らすか
  抵抗 R を下げることが基本方針となる。代表的な方策は次のとおり。
  (1) 力率改善: 負荷側に進相コンデンサを設置して無効電力を補償し、線路電流を
  減らすことで損失を低減する。(2) 配電電圧の格上げ(昇圧): 同一電力を高い電圧で
  送ると電流が反比例して減少し、損失は電圧の2乗に反比例して減少する。
  (3) 導体の太線化: 電線の断面積を増やして抵抗 R を下げ、I²R 損失を低減する。
  このほか負荷の平準化により負荷率を改善する方策も有効である。

rubric:
  - {point: 力率改善(進相コンデンサ), keywords: [力率, 進相コンデンサ, 無効電力], weight: 1}
  - {point: 配電電圧の格上げ, keywords: [昇圧, 格上げ, 電圧], weight: 1}
  - {point: 導体の太線化, keywords: [太線化, 断面積, 抵抗], weight: 1}
  - {point: 負荷の平準化, keywords: [平準化, 負荷率, ピーク], weight: 1}

prompt_hint: P_loss = 3 I^2 R を出発点に、電流低減と抵抗低減の観点で整理する。
